name: ToLOVEる データ取得

on:
  schedule:
    # 毎日10:00?23:00の間、30分おきに実行（JST = UTC+9）
    - cron: '0,30 1-14 * * *'
  workflow_dispatch:  # 手動実行ボタンも有効化

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: スクレイピング実行
        run: python scrape.py

      - name: HTMLを生成
        run: python generate_html.py

      - name: 結果をコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "データ更新: $(date '+%Y-%m-%d %H:%M' -d '+9 hours')"
          git push
